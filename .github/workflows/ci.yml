name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: amir_family_care
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amir_family_care"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: production
      APP_ENV: development
      LOG_LEVEL: info
      TZ: Europe/Moscow
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/amir_family_care
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/amir_family_care
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_NAME: Amir Family Care
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: amir_family_bot
      NEXT_PUBLIC_ENABLE_MOCK_TELEGRAM: "true"
      NEXT_PUBLIC_DEFAULT_LOCALE: ru-RU
      NEXT_PUBLIC_DEFAULT_TIMEZONE: Europe/Moscow
      BOT_TOKEN: test-token
      BOT_USERNAME: amir_family_bot
      BOT_TRANSPORT: polling
      BOT_HTTP_PORT: "3021"
      BOT_INTERNAL_API_TOKEN: ci-token
      BOT_TIMEZONE: Europe/Moscow
      WORKER_CONCURRENCY: "2"
      REMINDER_POLL_INTERVAL_MS: "15000"
      EXPORT_TTL_SECONDS: "86400"
      DAILY_SUMMARY_TIMEZONE: Europe/Moscow
      EXPORTS_BASE_URL: http://localhost:3000
      BOT_INTERNAL_BASE_URL: http://localhost:3021

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma Generate
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
