<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#090d12" />
    <title>Амир офлайн</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: #070a0f;
        color: #f8fafc;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at 20% 0%,
            rgba(59, 130, 246, 0.28),
            transparent 34%
          ),
          radial-gradient(
            circle at 90% 10%,
            rgba(236, 72, 153, 0.16),
            transparent 30%
          ),
          #070a0f;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 30px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: #a7b3c4;
        font-size: 16px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет соединения</h1>
      <p>
        Откройте приложение, когда интернет снова появится. Сохранённая оболочка
        останется доступной.
      </p>
    </main>
  </body>
</html>
